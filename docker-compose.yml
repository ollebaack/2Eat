services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: 2eat
      POSTGRES_USER: 2eat
      POSTGRES_PASSWORD: 2eat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 2eat"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/2Eat.Web.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=db;Database=2eat;Username=2eat;Password=2eat"
    ports:
      - "5264:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  webapp:
    build:
      context: src/2Eat.WebApp
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
