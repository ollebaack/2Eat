services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: 2eat
      POSTGRES_USER: 2eat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-2eat}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 2eat"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/2Eat.Web.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__twoeat: "Host=db;Database=2eat;Username=2eat;Password=${POSTGRES_PASSWORD:-2eat}"
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: "2eat-api"
      Jwt__Audience: "2eat-app"
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_IN_MINUTES:-60}
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-}
    ports:
      - "5264:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 10s

  webapp:
    build:
      context: src/2Eat.WebApp
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
