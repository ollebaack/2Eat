name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/2Eat.WebApp/src/**'
            backend:
              - 'src/**'
              - 'tests/**'
              - '!src/2Eat.WebApp/**'

  frontend-review:
    name: Frontend Review
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt

      - name: Run Frontend Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --max-turns 6
          prompt: |
            You are a code reviewer for the 2Eat project. Review only the frontend changes in this pull request.
            The diff is already in /tmp/pr-diff.txt — read that file. Review only files under src/2Eat.WebApp/src/.

            ## Frontend rules

            Shadcn-first: the project has pre-built Shadcn/Radix UI components in
            src/2Eat.WebApp/src/components/ui/. Before using a raw HTML element or writing
            a custom component, check if a Shadcn equivalent already exists.

            Available components: Badge, Button, Card, Dialog, Input, Label, Select,
            Separator, Skeleton, Sonner (toast/notifications), Textarea, Tooltip.

            Flag when you see:
            - Raw <button>, <input>, <select>, <textarea>, <dialog>, or <label> elements
              that should use the Shadcn equivalent from components/ui/
            - New reusable UI components defined inline in page/feature files that belong
              in src/components/ui/ instead
            - Custom implementations of loading states, toasts, or tooltips that duplicate
              Skeleton, Sonner, or Tooltip

            Do NOT flag:
            - HTML elements inside the components/ui/ files themselves (those are the implementations)
            - Semantic structural elements (<main>, <section>, <header>, <nav>, <ul>, <li>, etc.)
            - SVG or icon elements

            ## Output format

            Write your findings to /tmp/frontend-findings.txt. Do NOT post a PR comment.

            Content of the file should be just the findings (or "No issues found." if nothing to flag).
            For each finding: file path, line number(s), what the issue is, and a one-line suggested fix.
            Group multiple findings under the same rule together.
            Be concise — no summaries, no praise, just actionable findings.

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-findings
          path: /tmp/frontend-findings.txt

  backend-review:
    name: Backend Review
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt

      - name: Run Backend Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --max-turns 6
          prompt: |
            You are a code reviewer for the 2Eat project. Review only the backend changes in this pull request.
            The diff is already in /tmp/pr-diff.txt — read that file. Review only files under src/ and tests/,
            excluding src/2Eat.WebApp/.

            ## Backend rules

            Flag when you see:
            - Blocking async calls: .Result, .Wait(), .GetAwaiter().GetResult() on Tasks
            - Services instantiated with `new` instead of injected via constructor DI
            - MVC-style controllers or [ApiController] attributes — project uses Minimal APIs only
            - Application layer code that depends directly on EF Core types (DbContext, DbSet)
              instead of repository interfaces
            - Raw SQL strings — use EF Core LINQ queries
            - Read-only EF Core queries missing AsNoTracking()
            - Non-nullable return types returning null without ? annotation

            Do NOT flag:
            - Test files using `new` for test doubles or value objects — that is expected
            - Infrastructure layer (EfXxxRepository) using DbContext — that is its job

            ## Output format

            Write your findings to /tmp/backend-findings.txt. Do NOT post a PR comment.

            Content of the file should be just the findings (or "No issues found." if nothing to flag).
            For each finding: file path, line number(s), what the issue is, and a one-line suggested fix.
            Group multiple findings under the same rule together.
            Be concise — no summaries, no praise, just actionable findings.

      - uses: actions/upload-artifact@v4
        with:
          name: backend-findings
          path: /tmp/backend-findings.txt

  post-review:
    name: Post Combined Review
    runs-on: ubuntu-latest
    needs: [changes, frontend-review, backend-review]
    if: |
      always() &&
      (needs.frontend-review.result == 'success' || needs.backend-review.result == 'success')
    permissions:
      pull-requests: write

    steps:
      - if: needs.frontend-review.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: frontend-findings
          path: /tmp/frontend

      - if: needs.backend-review.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: backend-findings
          path: /tmp/backend

      - name: Post PR review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=""
          if [ -f /tmp/frontend/frontend-findings.txt ]; then
            BODY="### Frontend\n$(cat /tmp/frontend/frontend-findings.txt)"
          fi
          if [ -f /tmp/backend/backend-findings.txt ]; then
            if [ -n "$BODY" ]; then BODY="${BODY}\n\n"; fi
            BODY="${BODY}### Backend\n$(cat /tmp/backend/backend-findings.txt)"
          fi
          gh pr review ${{ github.event.pull_request.number }} --comment --body "$(printf "$BODY")"
